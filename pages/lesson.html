把危機化成了生機
這壯烈的交割典禮
這一去，就是下游了
那一堆獰怪的亂石
全在那下面等我
要把我撞傷，撞碎
撞成飛沫和漩渦
卻攔不住我
向一個出海口
奔騰而去的決心</p>
<p class="source-note">選自余光中《高樓對海》，九歌出版，1996 年</p>`,

  '5-2': `<p class="poem-title">一、武陵春（李清照）</p>
<p class="poem-stanza">風住塵香花已盡，日晚倦梳頭。
物是人非事事休，欲語淚先流。
聞說雙溪春尚好，也擬泛輕舟。
只恐雙溪舴艋舟，載不動、許多愁。</p>
<p class="poem-title">二、南鄉子‧登京口北固亭有懷（辛棄疾）</p>
<p class="poem-stanza">何處望神州？滿眼風光北固樓。
千古興亡多少事，悠悠，不盡長江滾滾流。
年少萬兜鍪，坐斷東南戰未休。
天下英雄誰敵手？曹劉。生子當如孫仲謀。</p>`,

  '5-4': `<p class="classical-para">風煙俱淨，天山共色，從流飄蕩，任意東西。自富陽至桐廬，一百許里，奇山異水，天下獨絕。</p>
<p class="classical-para">水皆縹碧，千丈見底，游魚細石，直視無礙。急湍甚箭，猛浪若奔。</p>
<p class="classical-para">夾岸高山，皆生寒樹，負勢競上，互相軒邈；爭高直指，千百成峰。泉水激石，泠泠作響；好鳥相鳴，嚶嚶成韻。蟬則千轉不窮，猿則百叫無絕。鳶飛戾天者，望峰息心；經綸世務者，窺谷忘返。橫柯上蔽，在晝猶昏；疏條交映，有時見日。</p>
<p class="source-note">南朝梁‧吳均〈與宋元思書〉</p>`,

  '5-7': `<p class="classical-para">舜發於畎畝之中，傅說舉於版築之間，膠鬲舉於魚鹽之中，管夷吾舉於士，孫叔敖舉於海，百里奚舉於市。</p>
<p class="classical-para">故天將降大任於是人也，必先苦其心志，勞其筋骨，餓其體膚，空乏其身，行拂亂其所為，所以動心忍性，曾益其所不能。</p>
<p class="classical-para">人恆過，然後能改；困於心，衡於慮，而後作；徵於色，發於聲，而後喻。入則無法家拂士，出則無敵國外患者，國恆亡。</p>
<p class="classical-para">然後知生於憂患，而死於安樂也。</p>
<p class="source-note">《孟子‧告子下》</p>`,

  '5-9': `<p class="classical-para">十月二十六日得家書，知新置田穫秋稼五百斛，甚喜。而今而後，堪為農夫以沒世矣。</p>
<p class="classical-para">我想天地間第一等人，只有農夫，而士為四民之末。農夫上者種地百畝，其次七八十畝，其次五六十畝，皆苦其身，勤其力，耕種收穫，以養天下之人。使天下無農夫，舉世皆餓死矣。吾輩讀書人，入則孝，出則弟，守先待後，得志，澤加於民；不得志，修身見於世；所以又高於農夫一等。今則不然，一捧書本，便想中舉人，中進士，作官如何攫取金錢，造大房屋，置多田產。起手便錯走了路頭，後來越做越壞，總沒有個好結果。其不能發達者，鄉里作惡，小頭銳面，更不可當。夫束修自好者，豈無其人？經濟自期，抗懷千古者，亦所在多有；而好人為壞人所累，遂令我輩開不得口。一開口，人便笑曰：「汝輩書生，總是會說，他日居官，便不如此說了。」所以忍氣吞聲，只得捱人笑罵。工人制器利用，賈人搬有運無，皆有便民之處；而士獨於民大不便，無怪乎居四民之末也，且求居四民之末而亦不可得也。</p>
<p class="classical-para">愚兄平生最重農夫。新招佃地人，必須待之以禮。彼稱我為主人，我稱彼為客戶；主客原是對待之義，我何貴而彼何賤乎？</p>
<p class="classical-para">吾家業地雖有三百畝，總是典產，不可久恃。將來須買田二百畝，予兄弟二人，各得百畝足矣，亦古者一夫受田百畝之義也。若再求多，便是占人產業，莫大罪過。天下無田無業者多矣，我獨何人，貪求無厭，窮民將何所措手足乎？</p>
<p class="source-note">清‧鄭燮〈濰縣署中寄舍弟墨第一書〉</p>`,

  /* ── 第六冊（九年級下學期）── */
  '6-1': `<p class="poem-stanza">如何讓你遇見我
在我最美麗的時刻
為這
我已在佛前
求了五百年
求祂讓我們結一段塵緣

佛於是把我化作一棵樹
長在你必經的路旁
陽光下慎重地開滿了花
朵朵都是我前世的盼望

當你走近
請你細聽
那顫抖的葉是我等待的熱情
而當你終於無視地走過
在你身後落了一地的
朋友啊
那不是花瓣
是我凋零的心</p>
<p class="source-note">席慕蓉〈一棵開花的樹〉，選自《七里香》，圓神出版</p>`,

  '6-2': `<p class="poem-title">一、天淨沙‧秋思（馬致遠）</p>
<p class="poem-stanza">枯藤老樹昏鴉，
小橋流水人家，
古道西風瘦馬。
夕陽西下，
斷腸人在天涯。</p>
<p class="poem-title">二、天淨沙‧秋（白樸）</p>
<p class="poem-stanza">孤村落日殘霞，
輕煙老樹寒鴉，
一點飛鴻影下。
青山綠水，
白草紅葉黃花。</p>
<p class="source-note">元‧馬致遠、白樸 散曲〈天淨沙〉</p>`,

  '6-3': `<p>黑暗的靜，讓人能聽見自己原來就擁有的那個聽覺能力，我確信自然和土地呼吸的氣聲隨著蟲鳴的叫聲，而有律動、節奏，蟲鳴聲間接地拉高代表著大地吐出的聲音。</p>
<p>我合眼佇立著，手中緊握獵槍，頭四十五度角聆聽由天飛來的聲音，朝地的耳朵聽著由地傳來的聲響，我靜靜地聆聽……這勝過在國家音樂廳般的一切感受。</p>
<p>露水滴落在臉上，是香的。我張開嘴伸出舌頭接著深夜滴落的露水，貫穿喉道的露水是甜的。我慢慢地張開眼睛，像聽了一場完美的演奏，凝視著周圍，朝著視覺穿不過的黑夜她的靜，好美……</p>
<p>如同父親所說的，當你開始熟悉黑夜後，你就會知道怎麼去貫穿黑夜的美。</p>
<p>祖父曾說過：「自然從未啞過，只是我們一直在背離她而已，我們不敢用真實去面對她，我們脫離了與她的歸屬感，讓自己獨享一切。她不說，但她在等，她等得很辛苦，因為我們已經遺忘了與她溝通的那個語言。」</p>
<p>不一會兒，我們便離開了主林道，斜切進父親採黃藤心的小徑。父親告訴我，前面有水源區，待會可以到那裡休息、喝水。來到水源區後，我竟然呆住地想笑，又說不出話來。我問卡瑪：「這就是你說的水源區，不會吧？」父親用手指著回答道：「就是這裡啊！天啊，我真的不敢相信眼前所看到的，很難讓我去想像水源區的定義。這裡的水源就如嬰兒尿尿般沒有力量的樣子，在我的觀念裡，『水源』一定要有很充足的水量，或是有一個很清澈的水潭，那才叫水源區啊！」</p>
<p>父親見我搖頭很難置信的樣子，說道：「兒子，別小看這麼一點點的水量，她是很彌足珍貴，就如你口乾後芋葉上的那個水滴一樣，在這麼大的獵場裡，也就只有這裡有水源，在附近耕作或打獵的人都來這裡用水，這裡是獵場裡唯一的水源區。」</p>
<p>水源區的下方原來有個大部落，那時的水量很大，足夠供給整個部落的人飲用。但部落遷走之後，水也停了，這幾年有些人原來的水源區挖掘，想再找一個水源頭出來，但就是挖不到。我曾經聽說有一個很老的老獵人來到這裡，他是原來那個舊部落的人，因為他想念自己的老家，就回來想回憶過去的情景。當他走到水源區時，看見水源區不再有水源流出，就對著水源說：『我知道你難過、孤單，不再讓人記起，我是你的朋友，沒有遺忘你，還是來看你，我知道你在聽我說話……』</p>
<p>之後，老獵人打了一個盹，聽見有人跟他說，翻開長滿蕨類的土表，在原有水口插進一枝竹管就會有水。果真，當老獵人正要起身離開時，就聽見竹管裡有如蜜蜂發出嗡嗡的聲音，過不久水就從竹管中流出。老獵人為了讓附近的人知道這裡有水流出，就在水滴落的地方放了一塊石板，石板下挖空，讓水的滴落聲能引起共鳴，讓人來到這裡取水。」</p>
<p>父親用手指著，要我看看水打在石板中的凹陷，說道：「那是一個真實的故事，是一個存在的證明，水源為什麼不大？這裡的老獵人說：『那是因為這裏一點點的水就已足夠讓在這裡工作、狩獵的人飲用了。這是自然定理，也是老獵人的約定。兒子，夠用就好了。』」</p>
<p>我張著口接著由竹管流出的水，水是甜的，「嗯，上哇不賴呀，卡瑪！」我看著獵人引水的傑作，插出的竹管用丫字型的樹幹撐著之後，延伸出來的是一個隨人身長切半的桂竹，最後水細細地落在水道的終點，底下用山下帶來的寶特瓶接水，看著周圍躺落滿滿水的寶特瓶，體會出老獵人對水那般地珍惜，和對自然土地那份情感的真實。</p>
<p>「春天的水是甜的，是香的。」父親問我：「聞到了嗎？」</p>
<p>「春天樹要發芽開花，樹的樹根會呼吸、眼睛會打開。樹根呼吸後會變粗，土地因而鬆動，當樹根和土地戀愛後，需要水的灌溉和滋潤，這時候樹芽會開花，由土地流出的水是最香、最甜的。」</p>
<p>「卡瑪，這裡的水比賣的水還要好喝，我看你以後也不用那麼辛苦地採黃藤心去賣，你就賣這裡的水好了。」</p>
<p>我看著父親，父親笑了一下，對我說的話好像有一點認同，我又開始亂幻想：「卡瑪賣的水叫『獵人喝的水』，喝了獵人的水之後，還能再越過幾座山，卡瑪你覺得這個促銷的廣告和宣傳詞好不好？」父親的話把我從幻想夢中驚醒，「來到這裡飲用功能水的人，才能喝到最甜、最有味道的水。唯有付出才能知道享用、受益的感覺。兒子，如果用你的方法在賣水，那只能叫滿足，永遠得不到被自然、大地擁抱的那個親情。」</p>
<p>我知道父親的意思，水是屬於這裡的，那是大地給的禮物和恩典，只給予來到這裡的人。我彎著腰，弓著身，將手掌合併伸直，接著由切半竹管流下細水，待水瀉滿後，甘甜地喝幾口，又將水潑在臉上，好涼、好涼，被水輕吻的感覺真好。</p>
<p>這條山徑，是父親付出勞力和血汗的最好證據，由採藤心的次數來換算他對我們付出的辛苦，我們的生活費、學費，就是從這條山徑走出來的。父親說：「我那麼辛苦，為的都是你們，現在我老了，有時候我經過這裡，踩在這條山徑的感受，讓我憶起了很多過去的情景。現在看你們都長大了，我的累也值得。兒子，你們讓我這個做父親的很榮耀，也很欣慰。」</p>
<p>父親的話，道出了他多年來想對我說的話、塵封壓抑的心情故事。也許那是一種分享心的承擔，更是一種接近親情父子關係的情感。我看著父親的背影，心想著：用生命、歲月付出的他，該是讓他休息的時候，這條採黃藤心的路已是一段記憶和歷史。現在，走在他後頭的那個孩子，不再是他老人家底的擔心。他已經長大了。</p>
<p>離開了父親採黃藤心的路，回到主林道，又經過老獵人的獵寮，看見老獵人用寶特瓶裝著由水源區帶回來的水，珍惜地整齊擺在獵寮旁，我能體會老獵人那種對自然恩典的感受，那種回應自然的真實和歸屬。</p>
<p class="source-note">亞榮隆‧撒可努〈水神的指引〉，選自《山豬‧飛鼠‧撒可努》，INK 印刻出版</p>`,

  '6-5': `<p class="classical-para">崇禎五年十二月，余住西湖。大雪三日，湖中人鳥聲俱絕。是日更定矣，余拏一小舟，擁毳衣爐火，獨往湖心亭看雪。霧凇沆碭，天與雲與山與水，上下一白。湖上影子，惟長堤一痕、湖心亭一點、與余舟一芥、舟中人兩三粒而已。</p>
<p class="classical-para">到亭上，有兩人鋪氈對坐，一童子燒酒爐正沸。見余，大喜曰：「湖中焉得更有此人！」拉余同飲。余強飲三大白而別。問其姓氏，是金陵人，客此。及下船，舟子喃喃曰：「莫說相公癡，更有癡似相公者！」</p>
<p class="source-note">明‧張岱〈湖心亭看雪〉，選自《陶庵夢憶》</p>`,

  /* ── 第四冊（八年級下學期）── */
  '4-7': `<p>提倡運動的人，以為運動可以增加個人民族體力的健康。是的，健康的體力，是一生努力成功的基礎；大家體力不發展，民族的生命力也就衰落下去。</p>
<p>古代希臘人以為「健全的心靈，寓於健全的身體。」這也是深刻的理論。身體不健康，心靈容易生病態，歷史上、傳記裡和心理學中的例證太多了。</p>
<p>這些都是對的，但是運動的精義，還不只此。它更有道德的意義，這意義就是在運動場上養成人生的正大態度、政治的光明修養，以陶鑄優良的民族性。這就是我所謂「運動家的風度」。</p>
<p>養成運動家的風度，首先要認識「君子之爭」。「君子無所爭，必也射乎。揖讓而升，下而飲，其爭也君子。」這是何等的光明，何等的雍容。運動是要守著一定的規律，在萬目睽睽的監視之下，從公開競爭而求得勝利的；所以一切不光明的態度，暗箭傷人的舉動，和背地裡占小便宜的心理，都當排斥。犯規的行動，雖然可因此得勝，且未被裁判者所覺察，然而這是有風度的運動家所引為恥辱而不屑採取的。</p>
<p>有風度的運動家，要有服輸的精神。「君子不怨天，不尤人。」運動家正是這種君子。按照正道做，輸了有何怨尤。我輸了只怪我自己不行；等我充實改進以後，下次再來。人家勝了，是他本事好，我只有佩服他：罵他不但是無聊，而且是無恥。歐美先進國家的人民，因為受了運動場上的訓練，服輸的精神是很豐富的。這種精神，常從體育的運動場上，帶進了政治的運動場上。譬如這次羅斯福與威爾基競選，在競選的時候，雖然互相批評；但是選舉揭曉以後，羅斯福收到第一個賀電，就是威爾基發的。這賀電的大意是：我們的政策，公諸國民之前，現在國民選擇你的，我竭誠地賀你成功。這和網球結局以後，勝利者和失敗者隔網握手的精神一樣。此次威爾基失敗以後，還幫助羅斯福作種種外交活動；一切以國家為前提，這也是值得讚許的。</p>
<p>有風度的運動家，不但有服輸的精神，而且更有超越勝敗的心胸。來競爭當然要求勝利，來比賽當然想創紀錄。但是有修養的運動家，必定要達到得失無動於中的境地。運動所重，乃在運動的精神。「勝固欣然，敗亦可喜。」正是重要的運動精神之一；否則就要變成「悻悻然」的小人了！</p>
<p>有風度的運動家是「言必信，行必果」的人。運動會要舉行宣誓，義即在此。臨陣脫逃，半途而廢，都不是運動家所應有的。「任重而道遠」和「貫徹始終」的精神，應由運動家表現。所以賽跑落後，無希望得獎，還要努力跑到的人，乃是有毅力的人。</p>
<p>運動家的風度表現在人生上，是一個莊嚴公正、協調進取的人生。有運動家風度的人，寧可有光明的失敗，決不要不榮譽的成功！</p>
<p class="source-note">羅家倫〈運動家的風度〉</p>`,

};

const LESSON_GUIDE = {
  '3-6': `<h3 class="guide-subtitle">作者：司馬遷</h3>
<p>司馬遷（約 145 BC－90 BC），字子長，西漢史學家，官至太史令（掌管天文曆法與史書記錄的官職）。他以畢生心血完成《史記》，記載從黃帝到漢武帝約三千年的歷史，是中國第一部紀傳體通史，魯迅稱之為「史家之絕唱，無韻之離騷」。</p>
<h3 class="guide-subtitle">李陵之禍：司馬遷的生命轉折</h3>
<p>司馬遷寫《史記》時，曾遭遇人生最大的打擊——<strong>李陵之禍</strong>。漢武帝天漢二年（99 BC），將領李陵率五千步兵深入匈奴，力戰後兵敗投降。朝廷群臣紛紛落井下石，唯有司馬遷挺身為李陵辯護，認為李陵是迫不得已才投降，並非出於真心背叛漢朝。</p>
<p>漢武帝大怒，以「誣罔」之罪判司馬遷死刑。當時死刑可以用錢贖免，或接受「宮刑」（閹割）代替死亡。司馬遷沒有財力贖罪，為了完成父親的遺願、完成《史記》，他選擇忍受了宮刑這一生不如死的奇恥大辱。</p>
<p>他在〈報任安書〉中寫道：「腸一日而九回，居則忽忽若有所亡，出則不知其所往。每念斯恥，汗未嘗不發背沾衣也。」——可見內心傷痛之深。</p>
<h3 class="guide-subtitle">司馬遷為何記錄這個故事？</h3>
<p>正因親身經歷了帝王一怒而置法律於不顧的悲劇，司馬遷對張釋之這樣敢於在皇帝盛怒之下堅持依法判決的官員，懷有深刻的敬佩與共鳴。《史記》中大量記錄了抗爭強權、堅守原則的人物，這不只是史學記錄，更是他借古人之口，說出那些在帝王威權下無法直言的心聲。</p>
<h3 class="guide-subtitle">時代背景：西漢文景之治</h3>
<p>本文發生於漢文帝（劉恆）在位期間（180 BC－157 BC）。文帝與其子景帝共同開創「文景之治」，以輕徭薄賦、休養生息為施政原則，是中國歷史上著名的治世。文帝個性寬仁，樂於納諫，這正是張釋之敢於諫言而不被殺頭的重要前提。</p>
<p>漢初經歷秦朝嚴苛法制的崩潰，統治者普遍有意建立更穩定的法治秩序。張釋之的堅持，恰好符合文帝「以德治國」的施政理念，因而最終得到皇帝的認可與支持。</p>
<h3 class="guide-subtitle">人物介紹</h3>
<ul class="guide-list">
  <li><strong>張釋之：</strong>西漢名臣，廷尉（最高司法官），以剛正不阿、秉公執法著稱。史書記載他多次在漢文帝面前直言，深受信任。</li>
  <li><strong>漢文帝：</strong>劉恆，以寬仁著稱。雖一時發怒，最終仍接受司法官的專業判斷，是歷史上少見的明君典範。</li>
  <li><strong>闖橋之人：</strong>外縣平民，因躲避不及而驚嚇御馬，成為這場法律風波的核心人物。他的案件看似微小，卻牽動整個法制原則。</li>
</ul>
<h3 class="guide-subtitle">段落深度解析</h3>
<p><strong>① 驚馬事件：</strong>一個平民躲在橋下，誤判時機走出來，嚇到了皇帝的馬。這是偶發事件，無心之失，但皇帝的憤怒是真實的。事件本身的輕重，與皇帝的情緒反應形成強烈落差，這個落差就是全篇的核心張力。</p>
<p><strong>② 廷尉奏當罰金：</strong>張釋之的判決「罰金」看似輕描淡寫，卻是他審問後依法得出的結論。文中沒有寫他如何掙扎，卻寫了他直接奏報——這種從容，正是法治信念最有力的展現。</p>
<p><strong>③ 文帝發怒：</strong>「吾馬賴柔和，令他馬，固不敗傷我乎？」文帝的邏輯是「假如……後果」，是情緒性的推論，而非法律事實。張釋之沒有正面反駁這個邏輯，而是繞到更高的層次——法律的公信力問題，這是極高明的諫言策略。</p>
<p><strong>④ 良久，上曰：廷尉當是也：</strong>「良久」兩字意味深長。文帝沉默了很長時間，這段沉默裡有怒氣的消退、有反思、有作為君主的自我克制。最終的認可，不是被說服，而是真正想通了。這也是漢文帝之所以被稱為明君的原因。</p>
<h3 class="guide-subtitle">核心主旨</h3>
<p><strong>法律之前人人平等：</strong>張釋之強調天子不能因個人喜怒隨意加重刑罰，法律的公信力高於一切。</p>
<p><strong>法治重於人治：</strong>「法者，天子所與天下公共也」——法律是天下人共同的準則，不是統治者的私器。「一傾而天下用法皆為輕重」說明司法標準一旦動搖，全天下的法制秩序都會崩潰。</p>
<p><strong>尊重專業、雅量納諫：</strong>漢文帝在情緒平復後，仍然接受廷尉的專業判斷，展現出一位明君應有的自我節制與納諫雅量。</p>`,

  '3-8': `<h3 class="guide-subtitle">寫作背景</h3>
<p>1063 年（宋仁宗嘉祐八年），周敦頤在江西南康擔任地方官，於官衙前挖池種蓮，日日對蓮沉思，遂寫下此文。當時北宋官場風氣腐敗，許多官員熱衷鑽營、攀附權貴。周敦頤面對「要不要同流合污」的困境，以蓮花為喻，寄託自己的人生選擇。</p>
<p>文中實為一個「三選一」的表態：</p>
<ul class="guide-list">
  <li><strong>菊（隱逸）：</strong>代表陶淵明——辭官歸隱，潔身自好。周敦頤欽佩，但不選擇。</li>
  <li><strong>牡丹（富貴）：</strong>代表當時多數官員——趨炎附勢、追名逐利。周敦頤嘆息諷刺。</li>
  <li><strong>蓮（君子）：</strong>代表周敦頤自己——留在官場，卻保持清白操守。這才是他的答案。</li>
</ul>
<p>周敦頤是宋代<strong>理學（新儒學）的開山鼻祖</strong>，程顥、程頤兄弟皆出自其門下，再傳至朱熹，影響中國思想數百年。這篇短文正是他「道德修養」哲學的縮影。</p>
<h3 class="guide-subtitle">延伸：什麼是宋代理學與新儒學？</h3>
<p>理學的「理」是「天地萬物的根本道理」。理學家想回答：<em>人為什麼應該有道德？道德從哪裡來？</em>他們的答案是：宇宙本身有一套「天理」，人的本性天生符合這套理，修養的目標就是克制私欲、讓天理重新顯現。</p>
<p>原來的孔孟儒學主要講人際關係（仁義禮智）和政治實踐，缺少宇宙論與形而上學。唐代佛教、道教哲學盛行，讓許多知識分子覺得儒學「膚淺」。宋代儒學家的策略是<strong>把佛道的哲學深度填回儒家框架</strong>，但把終極目標從「成佛」改回「成為君子、治理天下」——這便是「新儒學」。</p>
<h3 class="guide-subtitle">延伸：北宋官場為何腐敗？</h3>
<ul class="guide-list">
  <li><strong>冗官問題：</strong>宋朝科舉取士人數遠超前代，官位有限，大量官員領薪卻無事可做，形成龐大寄生階層。</li>
  <li><strong>科舉考詩文，不考治國：</strong>官員上任後不懂財政、水利、司法，實權落入底層吏員手中，貪腐難以監督。</li>
  <li><strong>新舊黨爭：</strong>王安石變法（1069年）引發改革派與保守派輪流執政、相互清洗，政治風氣極度惡劣。</li>
  <li><strong>軍事壓力榨乾財政：</strong>長期對遼、西夏、金支付歲幣，財政壓力逼使地方官員向百姓多收稅、多撈油水。</li>
</ul>
<p>周敦頤就是在這樣的環境下寫下〈愛蓮說〉——選擇以蓮花自喻，既不辭官避世，也不隨波逐流，是對那個腐敗時代最清醒、最有力的回應。</p>
<h3 class="guide-subtitle">寫作手法</h3>
<p><strong>託物言志：</strong>借蓮花的高潔形象，隱喻作者君子般的人格理想。</p>
<p><strong>對比手法：</strong>以「菊」象徵隱逸之士、「牡丹」象徵趨炎附勢之人，與「蓮」的君子形象形成三重對比，突顯蓮花出淤泥而不染的高雅脫俗。</p>
<h3 class="guide-subtitle">蓮花意象解析</h3>
<ul class="guide-list">
  <li><strong>出淤泥而不染：</strong>身處污濁環境卻不沾染污穢，象徵在惡劣環境中仍能堅守操守。</li>
  <li><strong>濯清漣而不妖：</strong>經清水洗滌卻不顯得妖豔，象徵樸實莊重、不嬌柔造作。</li>
  <li><strong>中通外直，不蔓不枝：</strong>內心通達、行為正直，不攀附權貴、不旁生枝節。</li>
  <li><strong>香遠益清，亭亭靜植：</strong>香氣傳得遠卻越發清幽，儀態端莊，令人敬重。</li>
  <li><strong>可遠觀而不可褻玩焉：</strong>只能從遠處靜靜欣賞，不可輕慢褻瀆，體現君子不容侵犯的人格尊嚴。</li>
</ul>
<p><strong>結語評價：</strong>結尾感嘆愛菊者少（隱士難尋），愛蓮者更稀（君子罕見），偏偏愛牡丹者眾（趨炎附勢者多），以此諷刺世風，寄寓惆悵之情。</p>`,

  '4-7': `<h3 class="guide-subtitle">作者：羅家倫</h3>
<p>羅家倫（1897－1969），字志希，浙江紹興人，五四運動的重要領袖之一，曾任清華大學、中央大學校長。他博學多才，長於議論文，文風嚴謹流暢，善用具體事例說理。本文寫於1940年代，以運動精神為切入點，倡導培養光明正大的人生態度，是其代表性的議論散文。</p>
<h3 class="guide-subtitle">各段段旨</h3>
<ol class="guide-list">
  <li><strong>第一段：</strong>說明提倡運動的一般目的是增強個人與民族體力，健康的體力是成功的基礎。</li>
  <li><strong>第二段：</strong>引用古希臘名言「健全的心靈，寓於健全的身體」，說明身心相互影響的深刻道理。</li>
  <li><strong>第三段：</strong>指出運動更深層的道德意義，引出全文核心概念「運動家的風度」。</li>
  <li><strong>第四段：</strong>說明第一項風度——認識「君子之爭」，遵守規則、公開競爭，不以不正當手段求勝。</li>
  <li><strong>第五段：</strong>說明第二項風度——「服輸的精神」，不怨天尤人，以羅斯福與威爾基競選後互送賀電及網球隔網握手為例。</li>
  <li><strong>第六段：</strong>說明第三項風度——超越勝敗的心胸，以「勝固欣然，敗亦可喜」的態度面對得失。</li>
  <li><strong>第七段：</strong>說明第四項風度——「言必信，行必果」，貫徹始終，不臨陣脫逃、半途而廢。</li>
  <li><strong>第八段〔結語〕：</strong>總結運動家的風度應用於人生，應莊嚴公正、協調進取，寧要光明的失敗，不要不榮譽的成功。</li>
</ol>
<h3 class="guide-subtitle">核心主旨</h3>
<p>本文以「運動家的風度」為題，藉運動精神論述人格修養。作者指出運動的真正意義不只在強健體魄，更在培養三大品德：<strong>守規則的公正態度</strong>（君子之爭）、<strong>服輸的謙遜精神</strong>（不怨天尤人）、以及<strong>貫徹始終的意志力</strong>（言必信，行必果）。這三種精神不只適用於運動場，更是處事做人的根本原則。全文以「寧可有光明的失敗，決不要不榮譽的成功」作結，點出品格高於名次的人生哲學。</p>
<h3 class="guide-subtitle">修辭法分析</h3>
<p><strong>引用：</strong>大量引用儒家經典強化論述——《論語》「君子無所爭，必也射乎。揖讓而升，下而飲，其爭也君子」說明君子之爭的典範；「君子不怨天，不尤人」說明服輸精神；「言必信，行必果」說明貫徹始終的承諾；「任重而道遠」說明責任感。另引古希臘名言「健全的心靈，寓於健全的身體」為論點建立哲學根基。</p>
<p><strong>舉例：</strong>以羅斯福與威爾基競選後互送賀電、威爾基仍助羅斯福外交為例，說明服輸精神在政治場域的實踐；以網球結局後隔網握手為例印證競爭精神；以賽跑落後仍堅持跑完為例說明貫徹始終的毅力。</p>
<p><strong>對比：</strong>以「有修養的運動家」對比「悻悻然的小人」，突顯超越勝敗的氣度；以「光明的失敗」對比「不榮譽的成功」，彰顯品格重於勝負的核心主旨。</p>
<p><strong>類比：</strong>將「體育的運動場」類比為「政治的運動場」，說明運動精神可遷移至人生各領域，擴大議題的普遍意義。</p>
<p><strong>排比：</strong>「一切不光明的態度，暗箭傷人的舉動，和背地裡占小便宜的心理，都當排斥」三項並列，增強排斥作弊行為的語氣；全文四大風度以排比結構論述，層次分明、氣勢貫通。</p>
<h3 class="guide-subtitle">寫作特色</h3>
<p><strong>以小見大：</strong>從運動場上的競爭規則，推廣至人生態度與政治精神，是議論文「就小題目說大道理」的典型示範。</p>
<p><strong>古今並用：</strong>將儒家經典（《論語》）與西方當代事件（羅斯福競選）並置，論述既有文化深度，又有現實說服力。</p>`,

  '6-3': `<h3 class="guide-subtitle">作者：亞榮隆‧撒可努</h3>
<p>亞榮隆‧撒可努（Ahronglong Sakinu），排灣族作家，生長於屏東縣獅子鄉，本名「撒可努」，是族語名字，意指「善於追蹤的人」。他以自身在部落的成長經歷為素材，用中文書寫原住民的狩獵文化、生態智慧與生命哲學，是台灣原住民文學的重要代表人物。代表作《山豬‧飛鼠‧撒可努》以細膩的筆觸描繪父子之間的知識傳承，獲得文建會故事獎，並改編為電影《不一樣的月光》。</p>
<h3 class="guide-subtitle">故事背景：父子入山與部落教育</h3>
<p>在排灣族傳統中，父親帶兒子入山狩獵，不只是技術的傳授，更是一套完整的生命教育——如何閱讀自然的訊息、如何在天地之間找到自己的位置、如何在取與捨之間維持與自然的平衡。本文以父親帶「我」入山尋找水源為線索，透過父親的言傳身教，層層揭示排灣族敬天愛地的生態智慧與謙遜的生命態度。</p>
<h3 class="guide-subtitle">各段段旨</h3>
<ol class="guide-list">
  <li><strong>第一段：</strong>在山林夜晚合眼靜立，以聽覺感受自然聲響，體驗超越音樂廳的深層寧靜。</li>
  <li><strong>第二段：</strong>露水香甜入口，祖父說人類已背離自然、遺忘了與她溝通的語言。</li>
  <li><strong>第三段：</strong>來到水源區，「我」對眼前微弱的水源感到難以置信。</li>
  <li><strong>第四段：</strong>父親說明這是獵場唯一的水源區，強調一點點水量對眾生的珍貴意義。</li>
  <li><strong>第五段：</strong>老獵人重返舊部落水源，真誠感懷感化水神令水源重現。</li>
  <li><strong>第六段：</strong>老獵人透過「水神」的指引找到水源並與族人分享。</li>
  <li><strong>第七段：</strong>以石板中的凹陷，增強「水神」故事的真實性，帶出父親「夠用就好」的生活哲學。</li>
  <li><strong>第八段：</strong>描述引水的設計與取用的情景，彰顯原住民族的生活智慧與對「水源」的珍惜。</li>
  <li><strong>第九段：</strong>藉父子的對話，道出原住民族與「大自然」的親近關係。唯有親近土地，才能感受水的香甜。</li>
  <li><strong>第十段：</strong>由父子對「賣水」的不同看法，說明「大自然」的禮物，只有親自付出，才能真正獲得。</li>
  <li><strong>第十一段：</strong>作者認同父親的想法，心存感恩地享受冰涼、甘甜的水源。</li>
  <li><strong>第十二段：</strong>父親回憶辛苦養育子女的歷程，看兒女順利成長，感到榮耀欣慰。</li>
  <li><strong>第十三段：</strong>由對「水神」的感恩連結到對父親的感恩，期待自己能回饋父親。</li>
  <li><strong>第十四段〔結語〕：</strong>作者感受到族人對「水源」的珍惜、對「大自然」的感恩。</li>
</ol>

function findLesson(vol, no) {
  for (const grade of TEXTS_DATA.grades) {
    for (const volume of grade.volumes) {
      if (+volume.vol === +vol) {
        const lesson = volume.lessons.find(l => +l.no === +no);
        if (lesson) return { grade, volume, lesson };
      }
    }
  }
  return null;
}

function prevNext(vol, no) {
  const allLessons = [];
  for (const grade of TEXTS_DATA.grades)
    for (const volume of grade.volumes)
      for (const lesson of volume.lessons)
        allLessons.push({ vol: volume.vol, no: lesson.no, title: lesson.title });
  const idx = allLessons.findIndex(l => +l.vol === +vol && +l.no === +no);
  return {
    prev: idx > 0 ? allLessons[idx - 1] : null,
    next: idx < allLessons.length - 1 ? allLessons[idx + 1] : null
  };
}

      btn.addEventListener('click', () => {
        opts.querySelectorAll('.quiz-opt').forEach(b => { b.disabled = true; });
        if (oi === q.ans) {
          btn.classList.add('correct');
          correct++;
        } else {
          btn.classList.add('wrong');
          opts.querySelectorAll('.quiz-opt')[q.ans].classList.add('correct');
        }
        answered++;
        badge.textContent = `得分：${correct} / ${questions.length}`;
        const exp = document.createElement('div');
        exp.className = 'quiz-exp';
        exp.textContent = `解析：${q.exp}`;
        item.appendChild(exp);
        if (answered === questions.length) {
          const final = document.createElement('div');
          final.className = 'quiz-final';
          const pct = Math.round(correct / questions.length * 100);
          final.textContent = `作答完畢！得分 ${correct} / ${questions.length}（${pct}%）`;
          wrap.insertBefore(final, reset);
        }
      });
      opts.appendChild(btn);
    });

    item.appendChild(qno);
    item.appendChild(qtext);
    item.appendChild(opts);
    wrap.appendChild(item);
  });

  const reset = document.createElement('button');
  reset.className = 'quiz-reset';
  reset.textContent = '↺ 重新作答';
  reset.addEventListener('click', () => {
    container.innerHTML = '';
    renderQuiz(questions, container);
  });
  wrap.appendChild(reset);

  container.appendChild(wrap);
}

function render() {
  const params = new URLSearchParams(location.search);
  const vol = params.get('vol');
  const no  = params.get('no');
  const found = findLesson(vol, no);
  const app = document.getElementById('app');

  if (!found) {
    app.innerHTML = '<p style="color:#c00;margin-top:2rem;">找不到課文，請返回目錄。</p>'
      + '<a class="back-btn" href="lessons.html">← 返回目錄</a>';
    return;
  }

  const { grade, volume, lesson } = found;
  const pending = lesson.title.includes('待確認');
  const tc = TYPE_CLASS[lesson.type] || 'default';
  const nav = prevNext(vol, no);
  const body      = LESSON_CONTENT[`${vol}-${no}`]     || null;
  const guide     = LESSON_GUIDE[`${vol}-${no}`]       || null;
  const vocab     = LESSON_VOCAB[`${vol}-${no}`]       || null;
  const walkthrough = LESSON_WALKTHROUGH[`${vol}-${no}`] || null;
  const quiz      = LESSON_QUIZ[`${vol}-${no}`]        || null;

  document.title = `${lesson.title} — 南一版國中國文`;

  app.innerHTML = `
    <div class="breadcrumb">
      <a href="lessons.html">課文目錄</a> › ${grade.label} › ${volume.label}
    </div>

    <div class="lesson-hero">
      <span class="lesson-vol-label">${volume.label} 第 ${lesson.no} 課</span>
      <h1>${lesson.title}</h1>
      <div class="lesson-meta">
        ${lesson.author ? `<span class="meta-author">✍ ${lesson.author}</span>` : ''}
        ${lesson.type   ? `<span class="meta-type ${tc}">${lesson.type}</span>` : ''}
      </div>
    </div>

    ${pending ? `
    <div class="content-section">
      <h2>課文資訊</h2>
      <p class="coming-soon">此課文資料尚待確認，敬請期待。</p>
    </div>` : `
    <div class="content-section">
      <h2>課文內容</h2>
      ${body
        ? `<div class="lesson-body">${body}</div>`
        : `<p class="coming-soon">課文內容即將上線。</p>`}
    </div>
    <div class="content-section">
      <h2>課文導讀</h2>
      ${guide
        ? `<div class="lesson-body">${guide}</div>`
        : `<p class="coming-soon">導讀說明即將上線。</p>`}
    </div>
    <div class="content-section">
      <h2>生字詞</h2>
      ${vocab
        ? `<div class="lesson-body">${vocab}</div>`
        : `<p class="coming-soon">生字詞注音與解釋即將上線。</p>`}
    </div>
    ${walkthrough ? `
    <div class="content-section">
      <h2>逐句導讀</h2>
      <div class="lesson-body">${walkthrough}</div>
    </div>` : ''}
    ${quiz ? `
    <div class="content-section">
      <h2>練習題（共 ${quiz.length} 題）</h2>
      <div id="quiz-container"></div>
    </div>` : ''}`}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;flex-wrap:wrap;gap:.5rem;">
      ${nav.prev
        ? `<a class="back-btn" href="lesson.html?vol=${nav.prev.vol}&no=${nav.prev.no}">← 上一課：${nav.prev.title}</a>`
        : `<span></span>`}
      <a class="back-btn" href="lessons.html">↑ 返回目錄</a>
      ${nav.next
        ? `<a class="back-btn" href="lesson.html?vol=${nav.next.vol}&no=${nav.next.no}">下一課：${nav.next.title} →</a>`
        : `<span></span>`}
    </div>`;

  if (quiz) {
    const qc = document.getElementById('quiz-container');
    if (qc) renderQuiz(quiz, qc);
  }
}

render();
</script>
</body>
</html>
