把生命揚在半空
乘著最透徹的一刻
以往和未來斷然一割
把危機化成了生機
這壯烈的交割典禮
這一去，就是下游了
那一堆獰怪的亂石
全在那下面等我
要把我撞傷，撞碎
撞成飛沫和漩渦
卻攔不住我
向一個出海口
奔騰而去的決心</p>
<p class="source-note">選自余光中《高樓對海》，九歌出版，1996 年</p>`,

  '5-2': `<p class="poem-title">一、武陵春（李清照）</p>
<p class="poem-stanza">風住塵香花已盡，日晚倦梳頭。
物是人非事事休，欲語淚先流。
聞說雙溪春尚好，也擬泛輕舟。
只恐雙溪舴艋舟，載不動、許多愁。</p>
<p class="poem-title">二、南鄉子‧登京口北固亭有懷（辛棄疾）</p>
<p class="poem-stanza">何處望神州？滿眼風光北固樓。
千古興亡多少事，悠悠，不盡長江滾滾流。
年少萬兜鍪，坐斷東南戰未休。
天下英雄誰敵手？曹劉。生子當如孫仲謀。</p>`,

  '5-4': `<p class="classical-para">風煙俱淨，天山共色，從流飄蕩，任意東西。自富陽至桐廬，一百許里，奇山異水，天下獨絕。</p>
<p class="classical-para">水皆縹碧，千丈見底，游魚細石，直視無礙。急湍甚箭，猛浪若奔。</p>
<p class="classical-para">夾岸高山，皆生寒樹，負勢競上，互相軒邈；爭高直指，千百成峰。泉水激石，泠泠作響；好鳥相鳴，嚶嚶成韻。蟬則千轉不窮，猿則百叫無絕。鳶飛戾天者，望峰息心；經綸世務者，窺谷忘返。橫柯上蔽，在晝猶昏；疏條交映，有時見日。</p>
<p class="source-note">南朝梁‧吳均〈與宋元思書〉</p>`,

  '5-7': `<p class="classical-para">舜發於畎畝之中，傅說舉於版築之間，膠鬲舉於魚鹽之中，管夷吾舉於士，孫叔敖舉於海，百里奚舉於市。</p>
<p class="classical-para">故天將降大任於是人也，必先苦其心志，勞其筋骨，餓其體膚，空乏其身，行拂亂其所為，所以動心忍性，曾益其所不能。</p>
<p class="classical-para">人恆過，然後能改；困於心，衡於慮，而後作；徵於色，發於聲，而後喻。入則無法家拂士，出則無敵國外患者，國恆亡。</p>
<p class="classical-para">然後知生於憂患，而死於安樂也。</p>
<p class="source-note">《孟子‧告子下》</p>`,

  '5-9': `<p class="classical-para">十月二十六日得家書，知新置田穫秋稼五百斛，甚喜。而今而後，堪為農夫以沒世矣。</p>
<p class="classical-para">我想天地間第一等人，只有農夫，而士為四民之末。農夫上者種地百畝，其次七八十畝，其次五六十畝，皆苦其身，勤其力，耕種收穫，以養天下之人。使天下無農夫，舉世皆餓死矣。吾輩讀書人，入則孝，出則弟，守先待後，得志，澤加於民；不得志，修身見於世；所以又高於農夫一等。今則不然，一捧書本，便想中舉人，中進士，作官如何攫取金錢，造大房屋，置多田產。起手便錯走了路頭，後來越做越壞，總沒有個好結果。其不能發達者，鄉里作惡，小頭銳面，更不可當。夫束修自好者，豈無其人？經濟自期，抗懷千古者，亦所在多有；而好人為壞人所累，遂令我輩開不得口。一開口，人便笑曰：「汝輩書生，總是會說，他日居官，便不如此說了。」所以忍氣吞聲，只得捱人笑罵。工人制器利用，賈人搬有運無，皆有便民之處；而士獨於民大不便，無怪乎居四民之末也，且求居四民之末而亦不可得也。</p>
<p class="classical-para">愚兄平生最重農夫。新招佃地人，必須待之以禮。彼稱我為主人，我稱彼為客戶；主客原是對待之義，我何貴而彼何賤乎？</p>
<p class="classical-para">吾家業地雖有三百畝，總是典產，不可久恃。將來須買田二百畝，予兄弟二人，各得百畝足矣，亦古者一夫受田百畝之義也。若再求多，便是占人產業，莫大罪過。天下無田無業者多矣，我獨何人，貪求無厭，窮民將何所措手足乎？</p>
<p class="source-note">清‧鄭燮〈濰縣署中寄舍弟墨第一書〉</p>`,

  /* ── 第六冊（九年級下學期）── */
  '6-1': `<p class="poem-stanza">如何讓你遇見我
在我最美麗的時刻
為這
我已在佛前
求了五百年
求祂讓我們結一段塵緣

佛於是把我化作一棵樹
長在你必經的路旁
陽光下慎重地開滿了花
朵朵都是我前世的盼望

當你走近
請你細聽
那顫抖的葉是我等待的熱情
而當你終於無視地走過
在你身後落了一地的
朋友啊
那不是花瓣
是我凋零的心</p>
<p class="source-note">席慕蓉〈一棵開花的樹〉，選自《七里香》，圓神出版</p>`,

  '6-2': `<p class="poem-title">一、天淨沙‧秋思（馬致遠）</p>
<p class="poem-stanza">枯藤老樹昏鴉，
小橋流水人家，
古道西風瘦馬。
夕陽西下，
斷腸人在天涯。</p>
<p class="poem-title">二、天淨沙‧秋（白樸）</p>
<p class="poem-stanza">孤村落日殘霞，
輕煙老樹寒鴉，
一點飛鴻影下。
青山綠水，
白草紅葉黃花。</p>
<p class="source-note">元‧馬致遠、白樸 散曲〈天淨沙〉</p>`,

  '6-3': `<p>下著梅雨的季節，令人心浮動，生活煩躁起來。尤其是上下課時，捧抱著大疊教材講義，站立在潮濕的街頭，看著呼嘯如流水奔湧的大小車輛，卻攔不住一輛出租車；那份狼狽，無由地令人沮喪。</p>
<p>也是在這樣綿綿密密、雨勢不絕的午後，匆忙地趕赴學校。搭車之前，先尋覓一家書店，影印若干講義給學生，因為時間的緊迫，我幾乎是跑進去的，迅速將原稿遞交從未謀面的年輕女店員。</p>
<p>那女孩有一雙細白的手掌，鋪好原稿，開動機器，她先影印了兩張尺寸較小的，而後將兩張影印稿並排成一大張。抬起頭，她微笑地說：「這樣不必印八十張，只要四十張就夠了。好不好？」</p>
<p>我詫異地看著她繼續工作，復印機一陣又一陣的光亮閃動裡，也詫異地看著她的美麗。</p>
<p>原本，她的五官平凡無奇，然而，此刻當我的心靈完全沉浸在這樣寧謐的氣氛中，她不再是個平凡女孩。</p>
<p>我看著她仔細地把每一張整齊裁開、疊好，裝進袋子，連同原稿還給我。付出雙倍勞力，卻只換來一半的酬勞，她主動做了，還顯得格外光采。</p>
<p>離開的時候，我的腳步緩慢了些。焦躁的感覺，全消散在一位陌生人善意的溫柔中。並且發現，即使行走在雨裡，也可以是一種自在心情。</p>
<p>第二次去澎湖，不再有亢奮的熱烈情緒，反而能在陽光海洋以外，見到更多更好的東西。</p>
<p>望安島上任意放牧的牛群；剛從海中撈起的白色珊瑚，用指甲輕劃，會發出「箏」的聲響。夏日渡海，從望安到了將軍嶼，一個距離現代文明更遠的地方。有些廢棄的房舍，仍保留著傳統建築，只是屋瓦和窗欞都綠草盈眼了。島上看不見什麼人，可以清晰聽見鞋底與水泥地的摩擦，這是一個隔絕的世界呢！</p>
<p>轉過一叢叢怒放的天人菊，在某個不起眼的牆角，我被一樣事物驚住了──一具藍色的公用電話。</p>
<p>不過是一具公用電話，市區裡多得幾乎感覺不到；然而，當我想到當初設置的計畫，渡海前來裝置、架接海底電纜……那麼複雜龐大的工程，只為了讓一個人傳遞他的平安或者思念，忍不住要為這樣妥貼的心意而動容了。</p>
<p>一個月的大陸探親之旅，到了後期已如殘兵敗將，恨不能丟盔棄甲。大城市的火車站規模不小，從下車的月台到出口，往往得上上下下攀爬許多階梯，那些大小箱子早超過我們的負荷能力了。</p>
<p>那一次，在南方的城市，車站階梯上，我們一步也掙不動，只好停下來喘息。一個年輕男子從我們身邊走過，像其它旅客一樣；而不同的是他注視著我們，並且也停下來。</p>
<p>「我來吧！」他溫和地說著，用捲起衣袖的手臂抬起大箱子，一直送到頂端。我們感激地向他道謝，他只笑一笑，很快地隱遁在人群中。</p>
<p>著白色襯衫的背影，笑容像學生般純凈，是我在那次旅行中，最美的印象了。</p>
<p>現代人因為寂寞的緣故，特別熱中於「談」情「說」愛；然而又因為吝嗇的緣故，情與愛都構築在薄弱的基礎上。</p>
<p>有時候，承受陌生人的好意，也會忍不住自問，我曾經替不相干的旁人做過什麼事？</p>
<p>人與世界的諸多聯繫，其實常常是與陌生人的交接，而對於這些人，無欲無求，反而能夠表現出真正的善意。</p>
<p>每一次照面，如芰荷映水，都是最珍貴而美麗的人間情分。</p>
<p class="source-note">張曼娟〈人間情分〉，選自《人間情分》，皇冠出版</p>`,

  '6-5': `<p class="classical-para">崇禎五年十二月，余住西湖。大雪三日，湖中人鳥聲俱絕。是日更定矣，余拏一小舟，擁毳衣爐火，獨往湖心亭看雪。霧凇沆碭，天與雲與山與水，上下一白。湖上影子，惟長堤一痕、湖心亭一點、與余舟一芥、舟中人兩三粒而已。</p>
<p class="classical-para">到亭上，有兩人鋪氈對坐，一童子燒酒爐正沸。見余，大喜曰：「湖中焉得更有此人！」拉余同飲。余強飲三大白而別。問其姓氏，是金陵人，客此。及下船，舟子喃喃曰：「莫說相公癡，更有癡似相公者！」</p>
<p class="source-note">明‧張岱〈湖心亭看雪〉，選自《陶庵夢憶》</p>`,

  /* ── 第四冊（八年級下學期）── */
  '4-7': `<p>古希臘人對於運動最為重視，他們認為健全的精神寓於健全的身體。而運動場上所培養出來的精神，即是我們所謂的「運動家的風度」。</p>
<p>運動家的風度，第一是要「遵守規則」。在運動場上，規則是神聖的。一個真正的運動家，絕不投機取巧，絕不為爭取勝利而破壞公正。即使在沒有裁判監督的情況下，他依然會自我約束，因為他尊重的是規則本身，而非名次。</p>
<p>第二是要「尊重對手」。有對手，才有競爭；有競爭，才有進步。對手不是敵人，而是切磋技藝的伴侶。贏了，要表現出「勝不驕」的氣度，對敗者給予應有的禮貌；輸了，要表現出「敗不餒」的風範，坦然接受失敗，並向勝者致賀。這就是所謂的「君子之爭」。</p>
<p>第三是要「貫徹始終」。運動場上最令人動容的，往往不是第一名衝過終點的瞬間，而是最後一名即便落後極遠，依然堅持跑完最後一程的決心。半途而廢的人，永遠體會不到運動的真諦。</p>
<p>綜上所述，運動家的風度不只是在場上的體能表現，更是在日常生活中的處事態度。一個有運動家風度的人，在事業上必然光明磊落，在人格上必然剛毅堅忍。</p>
<p class="source-note">梁實秋〈運動家的風度〉</p>`,

  /* ── 第六冊（九年級下學期）── */
  '6-6': `<p>父親說：「山裡的動物，是水神放牧在山上的牛羊，你要學會和牠們分享，牠們才會在你的森林裡長大、繁衍。」</p>
<p>有一次，我們在森林裡遇見一場大雨，雨水像神明的淚水一樣，從天空傾瀉而下。父親帶領我走在沒有路的路徑上，尋找一處可以遮風避雨的岩洞。那時我還小，感到非常恐懼，但父親卻說：「不要怕，那是水神在引路。」</p>
<p>我們在岩洞裡生火取暖，雨水滴落在洞口，發出清脆的節奏。父親指著遠方說：「你看，那些動物也正在躲雨，牠們在看著我們。你要記得，人和自然是共生的，我們取走我們需要的，剩下的要還給山神和水神。如果你心存感激，水神就會引領你找到出口。」</p>
<p>那天晚上，父親教我如何聽雨的聲音，如何分辨風傳來的訊息。他說，水流動的方向就是生命的脈動，只要你安靜下來，你就能聽見山林的呼吸。雨停後，月光灑在溼漉漉的樹葉上，像是點點星光落在人間。</p>
<p>父親帶著我走出森林，我發現原本陌生恐懼的山林，在水神的指引下，變得如此親近而神聖。我學會了不再用征服的眼光看待自然，而是學會彎下腰，用謙卑的心去領受大地的恩賜。</p>
<p class="source-note">亞榮隆‧撒可努〈水神的指引〉，選自《山豬‧飛鼠‧撒可努》，INK 印刻出版</p>`,
};

const LESSON_GUIDE = {
  '3-6': `<h3 class="guide-subtitle">作者：司馬遷</h3>
<p>司馬遷（約 145 BC－90 BC），字子長，西漢史學家，官至太史令（掌管天文曆法與史書記錄的官職）。他以畢生心血完成《史記》，記載從黃帝到漢武帝約三千年的歷史，是中國第一部紀傳體通史，魯迅稱之為「史家之絕唱，無韻之離騷」。</p>
<h3 class="guide-subtitle">李陵之禍：司馬遷的生命轉折</h3>
<p>司馬遷寫《史記》時，曾遭遇人生最大的打擊——<strong>李陵之禍</strong>。漢武帝天漢二年（99 BC），將領李陵率五千步兵深入匈奴，力戰後兵敗投降。朝廷群臣紛紛落井下石，唯有司馬遷挺身為李陵辯護，認為李陵是迫不得已才投降，並非出於真心背叛漢朝。</p>
<p>漢武帝大怒，以「誣罔」之罪判司馬遷死刑。當時死刑可以用錢贖免，或接受「宮刑」（閹割）代替死亡。司馬遷沒有財力贖罪，為了完成父親的遺願、完成《史記》，他選擇忍受了宮刑這一生不如死的奇恥大辱。</p>
<p>他在〈報任安書〉中寫道：「腸一日而九回，居則忽忽若有所亡，出則不知其所往。每念斯恥，汗未嘗不發背沾衣也。」——可見內心傷痛之深。</p>
<h3 class="guide-subtitle">司馬遷為何記錄這個故事？</h3>
<p>正因親身經歷了帝王一怒而置法律於不顧的悲劇，司馬遷對張釋之這樣敢於在皇帝盛怒之下堅持依法判決的官員，懷有深刻的敬佩與共鳴。《史記》中大量記錄了抗爭強權、堅守原則的人物，這不只是史學記錄，更是他借古人之口，說出那些在帝王威權下無法直言的心聲。</p>
<h3 class="guide-subtitle">時代背景：西漢文景之治</h3>
<p>本文發生於漢文帝（劉恆）在位期間（180 BC－157 BC）。文帝與其子景帝共同開創「文景之治」，以輕徭薄賦、休養生息為施政原則，是中國歷史上著名的治世。文帝個性寬仁，樂於納諫，這正是張釋之敢於諫言而不被殺頭的重要前提。</p>
<p>漢初經歷秦朝嚴苛法制的崩潰，統治者普遍有意建立更穩定的法治秩序。張釋之的堅持，恰好符合文帝「以德治國」的施政理念，因而最終得到皇帝的認可與支持。</p>
<h3 class="guide-subtitle">人物介紹</h3>
<ul class="guide-list">
  <li><strong>張釋之：</strong>西漢名臣，廷尉（最高司法官），以剛正不阿、秉公執法著稱。史書記載他多次在漢文帝面前直言，深受信任。</li>
  <li><strong>漢文帝：</strong>劉恆，以寬仁著稱。雖一時發怒，最終仍接受司法官的專業判斷，是歷史上少見的明君典範。</li>
  <li><strong>闖橋之人：</strong>外縣平民，因躲避不及而驚嚇御馬，成為這場法律風波的核心人物。他的案件看似微小，卻牽動整個法制原則。</li>
</ul>
<h3 class="guide-subtitle">段落深度解析</h3>
<p><strong>① 驚馬事件：</strong>一個平民躲在橋下，誤判時機走出來，嚇到了皇帝的馬。這是偶發事件，無心之失，但皇帝的憤怒是真實的。事件本身的輕重，與皇帝的情緒反應形成強烈落差，這個落差就是全篇的核心張力。</p>
<p><strong>② 廷尉奏當罰金：</strong>張釋之的判決「罰金」看似輕描淡寫，卻是他審問後依法得出的結論。文中沒有寫他如何掙扎，卻寫了他直接奏報——這種從容，正是法治信念最有力的展現。</p>
<p><strong>③ 文帝發怒：</strong>「吾馬賴柔和，令他馬，固不敗傷我乎？」文帝的邏輯是「假如……後果」，是情緒性的推論，而非法律事實。張釋之沒有正面反駁這個邏輯，而是繞到更高的層次——法律的公信力問題，這是極高明的諫言策略。</p>
<p><strong>④ 良久，上曰：廷尉當是也：</strong>「良久」兩字意味深長。文帝沉默了很長時間，這段沉默裡有怒氣的消退、有反思、有作為君主的自我克制。最終的認可，不是被說服，而是真正想通了。這也是漢文帝之所以被稱為明君的原因。</p>
<h3 class="guide-subtitle">核心主旨</h3>
<p><strong>法律之前人人平等：</strong>張釋之強調天子不能因個人喜怒隨意加重刑罰，法律的公信力高於一切。</p>
<p><strong>法治重於人治：</strong>「法者，天子所與天下公共也」——法律是天下人共同的準則，不是統治者的私器。「一傾而天下用法皆為輕重」說明司法標準一旦動搖，全天下的法制秩序都會崩潰。</p>
<p><strong>尊重專業、雅量納諫：</strong>漢文帝在情緒平復後，仍然接受廷尉的專業判斷，展現出一位明君應有的自我節制與納諫雅量。</p>`,

  '3-8': `<h3 class="guide-subtitle">寫作背景</h3>
<p>1063 年（宋仁宗嘉祐八年），周敦頤在江西南康擔任地方官，於官衙前挖池種蓮，日日對蓮沉思，遂寫下此文。當時北宋官場風氣腐敗，許多官員熱衷鑽營、攀附權貴。周敦頤面對「要不要同流合污」的困境，以蓮花為喻，寄託自己的人生選擇。</p>
<p>文中實為一個「三選一」的表態：</p>
<ul class="guide-list">
  <li><strong>菊（隱逸）：</strong>代表陶淵明——辭官歸隱，潔身自好。周敦頤欽佩，但不選擇。</li>
  <li><strong>牡丹（富貴）：</strong>代表當時多數官員——趨炎附勢、追名逐利。周敦頤嘆息諷刺。</li>
  <li><strong>蓮（君子）：</strong>代表周敦頤自己——留在官場，卻保持清白操守。這才是他的答案。</li>
</ul>
<p>周敦頤是宋代<strong>理學（新儒學）的開山鼻祖</strong>，程顥、程頤兄弟皆出自其門下，再傳至朱熹，影響中國思想數百年。這篇短文正是他「道德修養」哲學的縮影。</p>
<h3 class="guide-subtitle">延伸：什麼是宋代理學與新儒學？</h3>
<p>理學的「理」是「天地萬物的根本道理」。理學家想回答：<em>人為什麼應該有道德？道德從哪裡來？</em>他們的答案是：宇宙本身有一套「天理」，人的本性天生符合這套理，修養的目標就是克制私欲、讓天理重新顯現。</p>
<p>原來的孔孟儒學主要講人際關係（仁義禮智）和政治實踐，缺少宇宙論與形而上學。唐代佛教、道教哲學盛行，讓許多知識分子覺得儒學「膚淺」。宋代儒學家的策略是<strong>把佛道的哲學深度填回儒家框架</strong>，但把終極目標從「成佛」改回「成為君子、治理天下」——這便是「新儒學」。</p>
<h3 class="guide-subtitle">延伸：北宋官場為何腐敗？</h3>
<ul class="guide-list">
  <li><strong>冗官問題：</strong>宋朝科舉取士人數遠超前代，官位有限，大量官員領薪卻無事可做，形成龐大寄生階層。</li>
  <li><strong>科舉考詩文，不考治國：</strong>官員上任後不懂財政、水利、司法，實權落入底層吏員手中，貪腐難以監督。</li>
  <li><strong>新舊黨爭：</strong>王安石變法（1069年）引發改革派與保守派輪流執政、相互清洗，政治風氣極度惡劣。</li>
  <li><strong>軍事壓力榨乾財政：</strong>長期對遼、西夏、金支付歲幣，財政壓力逼使地方官員向百姓多收稅、多撈油水。</li>
</ul>
<p>周敦頤就是在這樣的環境下寫下〈愛蓮說〉——選擇以蓮花自喻，既不辭官避世，也不隨波逐流，是對那個腐敗時代最清醒、最有力的回應。</p>
<h3 class="guide-subtitle">寫作手法</h3>
<p><strong>託物言志：</strong>借蓮花的高潔形象，隱喻作者君子般的人格理想。</p>
<p><strong>對比手法：</strong>以「菊」象徵隱逸之士、「牡丹」象徵趨炎附勢之人，與「蓮」的君子形象形成三重對比，突顯蓮花出淤泥而不染的高雅脫俗。</p>
<h3 class="guide-subtitle">蓮花意象解析</h3>
<ul class="guide-list">
  <li><strong>出淤泥而不染：</strong>身處污濁環境卻不沾染污穢，象徵在惡劣環境中仍能堅守操守。</li>
  <li><strong>濯清漣而不妖：</strong>經清水洗滌卻不顯得妖豔，象徵樸實莊重、不嬌柔造作。</li>
  <li><strong>中通外直，不蔓不枝：</strong>內心通達、行為正直，不攀附權貴、不旁生枝節。</li>
  <li><strong>香遠益清，亭亭靜植：</strong>香氣傳得遠卻越發清幽，儀態端莊，令人敬重。</li>
  <li><strong>可遠觀而不可褻玩焉：</strong>只能從遠處靜靜欣賞，不可輕慢褻瀆，體現君子不容侵犯的人格尊嚴。</li>
</ul>
<p><strong>結語評價：</strong>結尾感嘆愛菊者少（隱士難尋），愛蓮者更稀（君子罕見），偏偏愛牡丹者眾（趨炎附勢者多），以此諷刺世風，寄寓惆悵之情。</p>`,

  '4-7': `<h3 class="guide-subtitle">作者：梁實秋</h3>
<p>梁實秋（1903－1987），字實秋，北京人，現代著名散文家、文學評論家與翻譯家。他以洗鍊幽默的筆調著稱，代表作《雅舍小品》廣受讀者喜愛，被譽為「中國散文第一人」。梁實秋也是第一位獨力翻譯《莎士比亞全集》的中文譯者，一生著述豐富，橫跨文學、批評與翻譯三大領域。</p>
<h3 class="guide-subtitle">文章結構：三層論點</h3>
<p>本文是標準的三段論式議論文，梁實秋以「運動家的風度」為核心，依序展開三個論點：</p>
<ul class="guide-list">
  <li><strong>遵守規則：</strong>規則是競賽的基石，真正的運動家即使無人監督，也不會以勝負凌駕於公正之上。</li>
  <li><strong>尊重對手：</strong>對手不是敵人，而是讓自己進步的伴侶。「勝不驕，敗不餒」是君子之爭的精髓。</li>
  <li><strong>貫徹始終：</strong>堅持跑完最後一程，才是運動精神的真正體現。名次不是唯一的意義。</li>
</ul>
<h3 class="guide-subtitle">延伸：從運動到人格</h3>
<p>梁實秋的高明之處在於，他從「運動場」出發，最後落腳在「人格修養」。他借用古希臘的體育精神（健全的身體寓於健全的精神），說明運動場上的規則意識、尊重對手與堅毅意志，與日常做人處事的原則完全一致。這是議論文「以小見大」手法的典型示範。</p>
<h3 class="guide-subtitle">核心名句</h3>
<p><strong>「勝不驕，敗不餒」：</strong>贏了不得意忘形，輸了不灰心喪志。這六個字是「運動家的風度」最精鍊的總結，也是普遍適用於人生各種競爭的態度。</p>
<p><strong>「健全的精神寓於健全的身體」：</strong>語出古希臘思想，強調身體鍛鍊與精神修養相輔相成，體育教育的意義遠超過勝負本身。</p>
<h3 class="guide-subtitle">論證方法</h3>
<ul class="guide-list">
  <li><strong>舉例論證：</strong>以「最後一名依然跑完全程」為例，具體說明「貫徹始終」的感動力量。</li>
  <li><strong>引用論證：</strong>引用古希臘體育哲學，為全文建立論述的文化根基。</li>
  <li><strong>類比論證：</strong>將運動場上的規則比照人生處事，擴大議題的普遍意義。</li>
</ul>`,

  '6-6': `<h3 class="guide-subtitle">作者：亞榮隆‧撒可努</h3>
<p>亞榮隆‧撒可努（Ahronglong Sakinu），排灣族作家，生長於屏東縣獅子鄉。他以自身在部落的成長經歷為素材，用中文書寫原住民的狩獵文化與生命哲學，是台灣原住民文學的重要代表人物。代表作《山豬‧飛鼠‧撒可努》以細膩的筆觸描繪父子之間的知識傳承，榮獲多項文學獎項。</p>
<h3 class="guide-subtitle">故事背景：狩獵與教育</h3>
<p>在排灣族傳統中，父親帶兒子入山狩獵，不只是技術的傳授，更是一套完整的生命教育——如何閱讀自然的訊息、如何在天地之間找到自己的位置、如何在取與捨之間維持與自然的平衡。本文以一場山中大雨為背景，父親透過雨聲、動物和岩洞，向孩子傳遞這套古老的山林智慧。</p>
<h3 class="guide-subtitle">主題分析</h3>
<ul class="guide-list">
  <li><strong>敬畏自然：</strong>文中的「水神」不是迷信，而是排灣族對大自然力量的尊重與詮釋。把動物比作「水神的牛羊」，是以神話語言表達一種生態倫理：動物不是人類的獵物，而是共享山林的生命。</li>
  <li><strong>人與自然共生：</strong>「我們取走我們需要的，剩下的要還給山神和水神」，體現原住民傳統的永續生態觀——與現代環保概念高度吻合，卻早已存在於部落文化中數百年。</li>
  <li><strong>謙卑的生命態度：</strong>文章結尾，孩子從「恐懼」到「謙卑」，從「征服」的視角轉為「領受」的心態，這是本文最核心的成長弧線。</li>
</ul>
<h3 class="guide-subtitle">文學特色</h3>
<p><strong>靈性的自然書寫：</strong>作者將山林描寫得充滿生命與意志——雨水是「神明的淚水」，水流有「生命的脈動」，月光「像是點點星光落在人間」。這種靈性視角是原住民文學有別於一般自然散文的核心特質。</p>
<p><strong>父子對話的教育結構：</strong>全文透過父親的引導語，推動敘事前進。父親每說一句話，都是一堂課；孩子沒有提問，只有觀察與感悟——這種沉默式的學習，正是部落教育的傳統形式。</p>`,
};

function findLesson(vol, no) {
  for (const grade of TEXTS_DATA.grades) {
    for (const volume of grade.volumes) {
      if (+volume.vol === +vol) {
        const lesson = volume.lessons.find(l => +l.no === +no);
        if (lesson) return { grade, volume, lesson };
      }
    }
  }
  return null;
}

function prevNext(vol, no) {
  const allLessons = [];
  for (const grade of TEXTS_DATA.grades)
    for (const volume of grade.volumes)
      for (const lesson of volume.lessons)
        allLessons.push({ vol: volume.vol, no: lesson.no, title: lesson.title });
  const idx = allLessons.findIndex(l => +l.vol === +vol && +l.no === +no);
  return {
    prev: idx > 0 ? allLessons[idx - 1] : null,
    next: idx < allLessons.length - 1 ? allLessons[idx + 1] : null
  };
}

function renderQuiz(questions, container) {
  let answered = 0, correct = 0;

  const wrap = document.createElement('div');
  wrap.className = 'quiz-wrap';

  const scoreRow = document.createElement('div');
  scoreRow.className = 'quiz-score-row';
  const badge = document.createElement('span');
  badge.className = 'quiz-score-badge';
  badge.textContent = `得分：0 / ${questions.length}`;
  scoreRow.appendChild(badge);
  wrap.appendChild(scoreRow);

  questions.forEach((q, qi) => {
    const item = document.createElement('div');
    item.className = 'quiz-item';

    const qno = document.createElement('div');
    qno.className = 'quiz-q-no';
    qno.textContent = `第 ${qi + 1} 題`;

    const qtext = document.createElement('div');
    qtext.className = 'quiz-q-text';
    qtext.textContent = q.q;

    const opts = document.createElement('div');
    opts.className = 'quiz-opts';

    const labels = ['Ａ', 'Ｂ', 'Ｃ', 'Ｄ'];
    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.textContent = `${labels[oi]}　${opt}`;
      btn.addEventListener('click', () => {
        opts.querySelectorAll('.quiz-opt').forEach(b => { b.disabled = true; });
        if (oi === q.ans) {
          btn.classList.add('correct');
          correct++;
        } else {
          btn.classList.add('wrong');
          opts.querySelectorAll('.quiz-opt')[q.ans].classList.add('correct');
        }
        answered++;
        badge.textContent = `得分：${correct} / ${questions.length}`;
        const exp = document.createElement('div');
        exp.className = 'quiz-exp';
        exp.textContent = `解析：${q.exp}`;
        item.appendChild(exp);
        if (answered === questions.length) {
          const final = document.createElement('div');
          final.className = 'quiz-final';
          const pct = Math.round(correct / questions.length * 100);
          final.textContent = `作答完畢！得分 ${correct} / ${questions.length}（${pct}%）`;
          wrap.insertBefore(final, reset);
        }
      });
      opts.appendChild(btn);
    });

    item.appendChild(qno);
    item.appendChild(qtext);
    item.appendChild(opts);
    wrap.appendChild(item);
  });

  const reset = document.createElement('button');
  reset.className = 'quiz-reset';
  reset.textContent = '↺ 重新作答';
  reset.addEventListener('click', () => {
    container.innerHTML = '';
    renderQuiz(questions, container);
  });
  wrap.appendChild(reset);

  container.appendChild(wrap);
}
